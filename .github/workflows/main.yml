name: Generate Snake Animation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake for Dark Mode
        id: snake-dark
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#bd93f9&color_dots=#282a36,#44475a,#6272a4,#bd93f9,#ff79c6&color_background=#282a36
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Snake for Light Mode
        id: snake-light
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#6272a4&color_dots=#f8f8f2,#f0f0f0,#e0e0e0,#a0a0ff,#bd93f9&color_background=#ffffff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - Log Generated Files
        run: |
          echo "Dark Snake URL: https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/output/github-contribution-grid-snake-dark.svg"
          echo "Light Snake URL: https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/output/github-contribution-grid-snake.svg"

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
